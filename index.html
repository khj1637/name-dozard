<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>이름 궁합 테스트 💕 | name.dozard.com</title>
  <meta name="description" content="내 이름과 상대방 이름으로 궁합을 테스트해보세요! 한글 획수로 계산하는 정통 이름 궁합">
  <meta property="og:title" content="이름 궁합 테스트 💕">
  <meta property="og:description" content="우리 궁합 몇 %일까? 지금 바로 테스트해봐!">
  <meta property="og:image" content="https://name.dozard.com/assets/img/og.png">
  <meta property="og:url" content="https://name.dozard.com">
  <meta property="og:type" content="website">
  <link rel="stylesheet" href="assets/css/style.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5636953164692974" crossorigin="anonymous"></script>
  <script>
    (adsbygoogle = window.adsbygoogle || []).push({
      google_ad_client: "ca-pub-5636953164692974",
      enable_page_level_ads: true
    });
  </script>
  <style>
    /* 성별 버튼 개선 */
    .gender-btns {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
    .gender-btn {
      flex: 1;
      height: 44px;
      border-radius: 12px;
      border: 2px solid rgba(255,107,157,0.2);
      background: var(--bg);
      font-size: 13px;
      font-weight: 700;
      font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: #999;
    }
    .gender-btn:active { transform: scale(0.97); }
    .gender-btn.active-M {
      border-color: #48CAE4;
      background: rgba(72,202,228,0.12);
      color: #0077B6;
      box-shadow: 0 0 0 3px rgba(72,202,228,0.15);
    }
    .gender-btn.active-F {
      border-color: var(--pink);
      background: rgba(255,107,157,0.12);
      color: var(--pink);
      box-shadow: 0 0 0 3px rgba(255,107,157,0.15);
    }
    /* 이름 입력 전체 너비 */
    .name-input {
      width: 100%;
      height: 56px;
      border: 2px solid rgba(255,107,157,0.2);
      border-radius: var(--radius-sm);
      padding: 0 18px;
      font-size: 22px;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 700;
      color: var(--dark);
      background: var(--bg);
      outline: none;
      transition: all 0.2s;
      letter-spacing: 4px;
      box-sizing: border-box;
    }
    .name-input:focus {
      border-color: var(--pink);
      background: white;
      box-shadow: 0 0 0 4px rgba(255,107,157,0.1);
    }
    .name-input::placeholder {
      color: #ccc;
      font-weight: 400;
      letter-spacing: 0;
      font-size: 14px;
    }
    /* 입력 오류 안내 */
    .input-hint {
      font-size: 12px;
      color: #FF6B9D;
      margin-top: 4px;
      min-height: 16px;
      display: none;
    }
    .input-hint.show { display: block; }
    @keyframes questionPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,107,157,0.4); }
      50% { transform: scale(1.15); box-shadow: 0 0 0 8px rgba(255,107,157,0); }
    }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>

<!-- 인터스티셜 오버레이 -->
<div class="interstitial-overlay" id="interstitialOverlay">
  <div class="interstitial-inner">
    <div class="interstitial-timer" id="interstitialTimer">5초 후 결과 확인 가능 ⏱️</div>
    <div style="text-align:center; padding:40px 20px; color:#bbb; font-size:15px; line-height:1.8;">
      ✨ 잠깐만요!<br>결과를 불러오는 중이에요 💕
    </div>
    <button class="interstitial-skip" id="interstitialSkip" onclick="goToResult()">
      💕 결과 확인하기
    </button>
  </div>
</div>

<div class="container">

  <!-- 헤더 -->
  <div class="header">
    <div class="header-badge">✨ 한글 획수 정통 계산법</div>
    <h1>이름 궁합<br>테스트 💕</h1>
    <p class="header-sub">우리 사이 몇 %일까? 지금 바로 확인해봐!</p>
  </div>

  <!-- 입력 카드 -->
  <div class="card">

    <!-- 내 이름 -->
    <div class="section-label">👤 내 이름</div>
    <input
      type="text"
      class="name-input"
      id="name1"
      placeholder="성 포함 3글자 이상 입력"
      maxlength="6"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    >
    <div class="input-hint" id="hint1">⚠️ 한글 이름만 입력할 수 있어요</div>
    <div class="gender-btns">
      <button class="gender-btn active-M" id="g1M" onclick="setGender(1,'M')">👦 남자</button>
      <button class="gender-btn" id="g1F" onclick="setGender(1,'F')">👧 여자</button>
    </div>
    <div class="strokes-preview" id="strokes1" style="margin-top:10px;"></div>

    <!-- VS -->
    <div class="vs-divider" style="margin: 20px 0;">
      <span class="vs-badge">VS</span>
    </div>

    <!-- 상대 이름 -->
    <div class="section-label">💝 상대 이름</div>
    <input
      type="text"
      class="name-input"
      id="name2"
      placeholder="성 포함 3글자 이상 입력"
      maxlength="6"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    >
    <div class="input-hint" id="hint2">⚠️ 한글 이름만 입력할 수 있어요</div>
    <div class="gender-btns">
      <button class="gender-btn" id="g2M" onclick="setGender(2,'M')">👦 남자</button>
      <button class="gender-btn active-F" id="g2F" onclick="setGender(2,'F')">👧 여자</button>
    </div>
    <div class="strokes-preview" id="strokes2" style="margin-top:10px;"></div>

    <!-- 궁합 타입 -->
    <div class="compat-type" id="compatType" style="margin-top:20px;">💕 연애 궁합</div>

    <!-- 계산 버튼 -->
    <button class="calc-btn" id="calcBtn" onclick="startCalc()" disabled style="margin-top:12px;">
      ✨ 궁합 계산하기
    </button>

  </div>

  <!-- 계산 애니메이션 -->
  <div class="animation-section" id="animSection">
    <div class="loading-text" id="loadingText">
      <span>운명의 실을 계산하는 중... 🧵</span>
    </div>
    <div class="calc-process" id="calcProcess"></div>
  </div>

  <!-- 결과보기 버튼 -->
  <div class="result-btn-wrap" id="resultBtnWrap">
    <button class="result-btn" onclick="showInterstitial()">
      💕 결과 확인하기
    </button>

  </div>

</div>

<script src="assets/js/hangul.js"></script>
<script>
  let gender1 = 'M';
  let gender2 = 'F';
  let calcResult = null;
  // 조합 중 여부 추적
  let composing1 = false;
  let composing2 = false;

  const LOADING_TEXTS = [
    '운명의 실을 계산하는 중... 🧵',
    '두 사람의 기운을 분석하는 중... ✨',
    '전생 기록을 열람하는 중... 📜',
    '우주의 별자리를 확인하는 중... 🌌',
    '두근두근 계산 중... 💓'
  ];

  window.addEventListener('DOMContentLoaded', () => {
    setupInput(1);
    setupInput(2);

    const params = getUrlParams();
    if (params.name1) {
      document.getElementById('name1').value = params.name1;
      setGender(1, params.gender1);
      updateStrokes(1);
    }
    if (params.name2) {
      document.getElementById('name2').value = params.name2;
      setGender(2, params.gender2);
      updateStrokes(2);
    }
    if (params.name1 && params.name2) {
      setTimeout(startCalc, 500);
    }
  });

  // 입력 이벤트 설정 — 조합 처리 핵심
  function setupInput(person) {
    const input = document.getElementById(`name${person}`);

    // 조합 시작 (한글 자모 조합 중)
    input.addEventListener('compositionstart', () => {
      if (person === 1) composing1 = true;
      else composing2 = true;
    });

    // 조합 완료
    input.addEventListener('compositionend', () => {
      if (person === 1) composing1 = false;
      else composing2 = false;
      filterAndUpdate(person);
    });

    // 일반 입력 (조합 중이 아닐 때만 처리)
    input.addEventListener('input', () => {
      const isComposing = person === 1 ? composing1 : composing2;
      if (!isComposing) {
        filterAndUpdate(person);
      }
    });
  }

  // 필터링 + 미리보기 업데이트
  function filterAndUpdate(person) {
    const input = document.getElementById(`name${person}`);
    const hint = document.getElementById(`hint${person}`);
    const original = input.value;

    // 한글만 허용 (완성형 + 자모 모두)
    const filtered = original.replace(/[^가-힣ㄱ-ㅎㅏ-ㅣ]/g, '');

    // 비한글 입력 시 힌트 표시
    if (original !== filtered && original.length > 0) {
      hint.classList.add('show');
      setTimeout(() => hint.classList.remove('show'), 2000);
    }

    if (input.value !== filtered) {
      input.value = filtered;
    }

    updateStrokes(person);
    checkCalcBtn();
  }

  // 획수 미리보기 업데이트
  function updateStrokes(person) {
    const input = document.getElementById(`name${person}`);
    const preview = document.getElementById(`strokes${person}`);
    // 완성형 한글만 획수 표시
    const name = input.value.replace(/[^가-힣]/g, '');

    preview.innerHTML = '';
    if (name.length > 0) {
      const strokes = getNameStrokes(name);
      name.split('').forEach((char, i) => {
        const chip = document.createElement('div');
        chip.className = 'stroke-chip';
        chip.innerHTML = `<span class="char">${char}</span>${strokes[i]}`;
        preview.appendChild(chip);
      });
    }
  }

  function checkCalcBtn() {
    // 완성형 한글만 카운트
    const n1 = document.getElementById('name1').value.replace(/[^가-힣]/g, '');
    const n2 = document.getElementById('name2').value.replace(/[^가-힣]/g, '');
    document.getElementById('calcBtn').disabled = !(n1.length >= 3 && n2.length >= 3);
  }

  function setGender(person, g) {
    if (person === 1) {
      gender1 = g;
      document.getElementById('g1M').className = 'gender-btn' + (g === 'M' ? ' active-M' : '');
      document.getElementById('g1F').className = 'gender-btn' + (g === 'F' ? ' active-F' : '');
    } else {
      gender2 = g;
      document.getElementById('g2M').className = 'gender-btn' + (g === 'M' ? ' active-M' : '');
      document.getElementById('g2F').className = 'gender-btn' + (g === 'F' ? ' active-F' : '');
    }
    updateCompatType();
  }

  function updateCompatType() {
    const el = document.getElementById('compatType');
    const type = `${gender1}-${gender2}`;
    if (type === 'M-F' || type === 'F-M') {
      el.textContent = '💕 연애 궁합';
      el.style.background = 'rgba(255,107,157,0.1)';
      el.style.color = '#FF6B9D';
    } else if (type === 'M-M') {
      el.textContent = '👬 우정 궁합';
      el.style.background = 'rgba(72,202,228,0.1)';
      el.style.color = '#0077B6';
    } else {
      el.textContent = '👭 우정 궁합';
      el.style.background = 'rgba(199,125,255,0.1)';
      el.style.color = '#C77DFF';
    }
  }

  function startCalc() {
    // 완성형만 추출
    const name1 = document.getElementById('name1').value.replace(/[^가-힣]/g, '');
    const name2 = document.getElementById('name2').value.replace(/[^가-힣]/g, '');
    if (name1.length < 3 || name2.length < 3) return;

    calcResult = calcCompatibility(name1, name2);

    document.getElementById('animSection').classList.add('show');
    document.getElementById('resultBtnWrap').classList.remove('show');
    document.getElementById('calcProcess').innerHTML = '';

    setTimeout(() => {
      document.getElementById('animSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);

    let textIdx = 0;
    const loadingEl = document.getElementById('loadingText');
    loadingEl.innerHTML = `<span>${LOADING_TEXTS[0]}</span>`;
    const textInterval = setInterval(() => {
      textIdx = (textIdx + 1) % LOADING_TEXTS.length;
      loadingEl.innerHTML = `<span>${LOADING_TEXTS[textIdx]}</span>`;
    }, 800);

    renderCalcProcess(calcResult.steps, name1, name2, () => {
      clearInterval(textInterval);
      loadingEl.innerHTML = '<span>마지막 숫자가 숨겨졌어요! 결과를 확인해봐 🔥</span>';
      document.getElementById('resultBtnWrap').classList.add('show');
      document.querySelectorAll('.calc-num.highlight').forEach(el => {
        el.style.animation = 'questionPulse 1s ease-in-out infinite';
      });
      setTimeout(() => {
        document.getElementById('resultBtnWrap').scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 200);
    });
  }

  function renderCalcProcess(steps, name1, name2, onDone) {
    const container = document.getElementById('calcProcess');
    container.innerHTML = '';
    let rowIdx = 0;

    function renderNextRow() {
      if (rowIdx >= steps.length) {
        setTimeout(onDone, 300);
        return;
      }

      const step = steps[rowIdx];
      const numRow = document.createElement('div');
      numRow.className = 'calc-row';

      step.forEach((num, i) => {
        const el = document.createElement('div');
        el.className = 'calc-num';
        if (rowIdx === 0) {
          el.classList.add(i < name1.length ? 'name1' : 'name2');
        }
        if (rowIdx === steps.length - 1) {
          el.classList.add('highlight');
          el.textContent = '?';
        } else {
          el.textContent = num;
        }
        numRow.appendChild(el);
      });

      container.appendChild(numRow);
      setTimeout(() => numRow.classList.add('visible'), 50);
      rowIdx++;

      if (rowIdx < steps.length) {
        setTimeout(() => {
          const bracketRow = document.createElement('div');
          bracketRow.className = 'bracket-row';
          for (let i = 0; i < step.length - 1; i++) {
            const item = document.createElement('div');
            item.className = 'bracket-item';
            const line = document.createElement('div');
            line.className = 'bracket-line';
            item.appendChild(line);
            bracketRow.appendChild(item);
            if (i < step.length - 2) {
              bracketRow.appendChild(document.createElement('div')).className = 'bracket-item';
            }
          }
          container.appendChild(bracketRow);
          setTimeout(() => bracketRow.classList.add('visible'), 50);
          setTimeout(renderNextRow, 380);
        }, 300);
      } else {
        setTimeout(renderNextRow, 300);
      }
    }

    renderNextRow();
  }

  function showInterstitial() {
    const overlay = document.getElementById('interstitialOverlay');
    overlay.classList.add('show');
    let count = 5;
    const timerEl = document.getElementById('interstitialTimer');
    const skipBtn = document.getElementById('interstitialSkip');

    const countdown = setInterval(() => {
      count--;
      timerEl.textContent = `${count}초 후 결과 확인 가능 ⏱️`;
      if (count <= 0) {
        clearInterval(countdown);
        timerEl.textContent = '결과를 확인할 수 있어요! 💕';
        skipBtn.classList.add('show');
      }
    }, 1000);
  }

  function goToResult() {
    const name1 = document.getElementById('name1').value.replace(/[^가-힣]/g, '');
    const name2 = document.getElementById('name2').value.replace(/[^가-힣]/g, '');
    window.location.href = `result.html?a=${encodeURIComponent(name1)}&b=${encodeURIComponent(name2)}&g1=${gender1}&g2=${gender2}&s=${calcResult.score}`;
  }
</script>
</body>
</html>
