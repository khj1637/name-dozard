<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>이름 궁합 결과 💕 | name.dozard.com</title>
  <meta name="description" content="이름 궁합 테스트 결과를 확인해보세요!">
  <meta property="og:title" content="이름 궁합 테스트 결과 💕">
  <meta property="og:description" content="우리 궁합 몇 %? 지금 바로 확인해봐!">
  <meta property="og:image" content="https://name.dozard.com/assets/img/og.png">
  <meta property="og:url" content="https://name.dozard.com">
  <link rel="stylesheet" href="assets/css/style.css">
  <!-- AdSense 자동광고 -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5636953164692974" crossorigin="anonymous"></script>
  <script>
    (adsbygoogle = window.adsbygoogle || []).push({
      google_ad_client: "ca-pub-5636953164692974",
      enable_page_level_ads: true
    });
  </script>
  <!-- 카카오 SDK -->
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous"></script>

  <style>
    @keyframes confettiFall {
      0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .confetti {
      position: fixed;
      width: 10px;
      height: 10px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
      z-index: 9998;
      pointer-events: none;
    }
    .result-card-animate {
      animation: resultCardIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes resultCardIn {
      from { transform: scale(0.8) translateY(30px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-6px); }
      80% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.5s ease; }
    .gauge-wrap { margin: 0 auto 20px; width: 100%; }
    .gauge-bar-bg {
      background: #f0f0f0;
      border-radius: 100px;
      height: 20px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .gauge-bar-fill {
      height: 100%;
      border-radius: 100px;
      width: 0%;
      transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .gauge-bar-fill::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer { to { left: 100%; } }
    .gauge-score {
      text-align: right;
      font-family: 'Gaegu', cursive;
      font-size: 28px;
      font-weight: 700;
      color: var(--dark);
    }
    .related-section { margin-top: 8px; }
    .related-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--gray);
      margin-bottom: 10px;
      text-align: center;
    }
    .related-cards { display: flex; gap: 8px; }
    .related-card {
      flex: 1;
      background: white;
      border-radius: var(--radius-sm);
      padding: 16px 12px;
      text-align: center;
      box-shadow: 0 4px 12px rgba(255,107,157,0.1);
      border: 1.5px solid rgba(255,107,157,0.1);
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      color: var(--dark);
    }
    .related-card:active { transform: scale(0.97); }
    .related-card .rc-emoji { font-size: 24px; margin-bottom: 6px; }
    .related-card .rc-title { font-size: 12px; font-weight: 700; }
    .related-card .rc-sub { font-size: 11px; color: var(--gray); }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>

<div class="container">

  <!-- 헤더 -->
  <div class="header" style="padding: 28px 0 16px;">
    <div class="header-badge">✨ 궁합 결과</div>
    <h1 style="font-size:28px;">이름 궁합<br>결과 발표! 💕</h1>
  </div>

  <!-- 결과 카드 -->
  <div class="card result-card-animate" id="resultCard" style="display:none;">

    <div class="result-type-badge" id="resultTypeBadge">💕 연애 궁합</div>

    <div class="result-names" id="resultNames">
      <span id="rName1">-</span>
      <span class="connector">♥</span>
      <span id="rName2">-</span>
    </div>

    <div class="gauge-wrap">
      <div class="gauge-bar-bg">
        <div class="gauge-bar-fill" id="gaugeBar"></div>
      </div>
      <div class="gauge-score" id="gaugeScore">0%</div>
    </div>

    <span class="result-emoji" id="resultEmoji">💕</span>
    <div class="result-grade" id="resultGrade" style="color: var(--pink);">-</div>
    <div class="result-desc" id="resultDesc">-</div>

    <div class="action-btns">
      <button class="action-btn btn-kakao" onclick="onKakaoShare()">
        <img src="https://developers.kakao.com/assets/img/about/logos/kakaotalksharing/kakaotalk_sharing_btn_medium.png"
             style="width:20px;height:20px;" alt="카카오"> 카카오 공유
      </button>
      <button class="action-btn btn-save" onclick="onSaveImage()">
        📸 이미지 저장
      </button>
    </div>
    <div style="margin-top:8px;">
      <button class="action-btn btn-retry" onclick="goHome()" style="width:100%;">
        🔄 다른 이름으로 테스트하기
      </button>
    </div>

  </div>

  <!-- 관련 콘텐츠 -->
  <div class="related-section">
    <div class="related-title">✨ 다른 테스트도 해보기</div>
    <div class="related-cards">
      <a class="related-card" href="index.html">
        <div class="rc-emoji">💕</div>
        <div class="rc-title">이름 궁합</div>
        <div class="rc-sub">다시 테스트</div>
      </a>
      <a class="related-card" href="#">
        <div class="rc-emoji">⭐</div>
        <div class="rc-title">별자리 궁합</div>
        <div class="rc-sub">준비 중</div>
      </a>
      <a class="related-card" href="#">
        <div class="rc-emoji">🩸</div>
        <div class="rc-title">혈액형 궁합</div>
        <div class="rc-sub">준비 중</div>
      </a>
    </div>
  </div>

</div>

<script src="assets/js/hangul.js"></script>
<script src="assets/js/canvas.js"></script>
<script src="assets/js/kakao.js"></script>
<script>
  let resultData = {};

  window.addEventListener('DOMContentLoaded', () => {
    const params = getUrlParams();
    const name1 = params.name1;
    const name2 = params.name2;
    const g1 = params.gender1;
    const g2 = params.gender2;

    if (!name1 || !name2) {
      window.location.href = 'index.html';
      return;
    }

    const urlScore = new URLSearchParams(window.location.search).get('s');
    const score = urlScore !== null ? parseInt(urlScore) : calcCompatibility(name1, name2).score;
    const grade = getGrade(score, g1, g2);

    resultData = { name1, name2, score, grade, g1, g2 };

    renderResult(name1, name2, score, grade);
    saveHistory(name1, name2, score, grade.grade, g1, g2);
  });

  function renderResult(name1, name2, score, grade) {
    document.getElementById('rName1').textContent = name1;
    document.getElementById('rName2').textContent = name2;
    document.getElementById('resultTypeBadge').textContent = grade.type;

    const type = `${resultData.g1}-${resultData.g2}`;
    if (type === 'M-M' || type === 'F-F') {
      document.querySelector('.connector').textContent = '🤝';
    }

    document.getElementById('resultEmoji').textContent = grade.emoji;

    const gradeEl = document.getElementById('resultGrade');
    gradeEl.textContent = grade.grade;
    gradeEl.style.color = grade.color;

    document.getElementById('resultDesc').textContent = `"${grade.desc}"`;
    document.getElementById('resultCard').style.display = 'block';

    setTimeout(() => animateGauge(score, grade.color), 300);

    if (score >= 65) {
      setTimeout(launchConfetti, 600);
    } else if (score < 30) {
      setTimeout(() => {
        document.getElementById('resultCard').classList.add('shake');
      }, 600);
    }
  }

  function animateGauge(score, color) {
    const bar = document.getElementById('gaugeBar');
    const scoreEl = document.getElementById('gaugeScore');

    let barColor;
    if (score >= 65) barColor = 'linear-gradient(90deg, #FF6B9D, #C77DFF)';
    else if (score >= 40) barColor = 'linear-gradient(90deg, #FFD166, #FF9E00)';
    else barColor = 'linear-gradient(90deg, #748DA6, #4A6275)';

    bar.style.background = barColor;
    bar.style.width = `${score}%`;

    let current = 0;
    const step = score / 60;
    const counter = setInterval(() => {
      current = Math.min(current + step, score);
      scoreEl.textContent = `${Math.floor(current)}%`;
      if (current >= score) {
        scoreEl.textContent = `${score}%`;
        clearInterval(counter);
      }
    }, 25);
  }

  function launchConfetti() {
    const colors = ['#FF6B9D', '#C77DFF', '#48CAE4', '#FFD166', '#FF8FAB'];
    const emojis = ['💕', '✨', '🌸', '💘', '⭐'];
    for (let i = 0; i < 30; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = `${Math.random() * 100}vw`;
        el.style.top = '-20px';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDuration = `${1.5 + Math.random() * 2}s`;
        el.style.animationDelay = `${Math.random() * 0.5}s`;
        if (Math.random() > 0.7) {
          el.style.background = 'transparent';
          el.style.fontSize = '18px';
          el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        }
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 4000);
      }, i * 60);
    }
  }

  function saveHistory(name1, name2, score, grade, g1, g2) {
    const history = JSON.parse(localStorage.getItem('nameHistory') || '[]');
    history.unshift({ name1, name2, score, grade, g1, g2, date: new Date().toLocaleDateString('ko-KR') });
    if (history.length > 10) history.pop();
    localStorage.setItem('nameHistory', JSON.stringify(history));
  }

  function onKakaoShare() {
    const { name1, name2, score, grade } = resultData;
    shareKakao(name1, name2, score, grade.grade, grade.emoji);
  }

  function onSaveImage() {
    const { name1, name2, score, grade } = resultData;
    saveResultImage(name1, name2, score, grade.grade, grade.emoji, grade.desc, grade.type);
    showToast('이미지 저장 중... 💕');
  }

  function goHome() {
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
